function npochamu(w, h) {
  return '<img src="' + NPOIMG + '" width="' + w + '" height="' + h + '" style="object-fit:contain" />';
}

function face() { return npochamu(600, 600); }

function meterFace(pct) { return npochamu(150, 150); }



function updDots(){
  var w=document.getElementById("dots");
  w.innerHTML="";
  if(step<0)return;
  Q.forEach(function(_,i){
    var d=document.createElement("div");
    d.className="dot"+(i<step?" done":i===step?" active":"");
    w.appendChild(d);
  });
}

function fade(fn){
  var s=document.getElementById("scr");
  s.style.opacity="0";
  setTimeout(function(){fn();s.style.opacity="1";},200);
}

function intro(){
  step=-1;total=0;updDots();
  fade(function(){
    document.getElementById("scr").innerHTML=
      '<div style="text-align:center;padding:1rem 0 1.75rem">'
      +'<div style="margin-bottom:0.75rem">'+npochamu(110,132)+'</div>'
      +'<h1 style="font-size:22px;font-weight:700;color:#333;margin-bottom:0.4rem">んぽちゃむ度診断</h1>'
      +'<p style="font-size:13px;color:#85BFAE;font-weight:600;letter-spacing:0.08em;margin-bottom:1rem">— ヨーグルトの妖精診断 —</p>'
      +'<p style="font-size:14px;color:#888;line-height:1.8;margin-bottom:1.75rem">'
      +'15の質問に答えて、あなたの<br><b style="color:#5DCAA5">んぽちゃむ成分</b>を測定するちゃむ！</p>'
      +'<button class="start-btn" onclick="startQ()">はじめるちゃむ！</button>'
      +'</div>';
  });
}

function startQ(){step=0;total=0;renderQ();}

function renderQ(){
  updDots();var q=Q[step];
  fade(function(){
    var html='<div style="text-align:center;margin-bottom:0.75rem">'
      +'<span style="font-size:12px;color:#aaa">'+(step+1)+' / '+Q.length+'</span>'
      +'</div>'
      +'<div class="card" style="text-align:center">'
      +'<p style="font-size:16px;font-weight:600;color:#444;line-height:1.7;margin:0">'+q.q+'</p>'
      +'</div>';
    q.o.forEach(function(o,i){
      html+='<button class="opt-btn" onclick="ans('+o.p+')">'
        +'<span class="abcd">'+"ABCD"[i]+'</span>'
        +o.t+'</button>';
    });
    document.getElementById("scr").innerHTML=html;
  });
}

function ans(p){
  total+=p;step++;
  if(step>=Q.length)result();else renderQ();
}

function result(){
  var lv=LEVELS[0];
  for(var i=0;i<LEVELS.length;i++){if(total>=LEVELS[i].min&&total<=LEVELS[i].max){lv=LEVELS[i];break;}}
  var pct=Math.round(total/MAX*100);
  document.getElementById("dots").innerHTML="";
  fade(function(){
    var barW=Math.max(2,pct);
    var html='<div style="text-align:center;padding-top:0.5rem;margin-bottom:1.25rem">'
      +'<p style="font-size:12px;color:#aaa;margin-bottom:0.5rem;letter-spacing:0.1em">診断結果</p>'
      +'<div style="margin:0 auto 0.75rem;display:inline-block">'+meterFace(pct)+'</div>'
      +'<p style="font-size:36px;font-weight:800;color:'+lv.tc+';margin-bottom:0.25rem">'+pct+'%</p>'
      +'<span style="display:inline-block;background:'+lv.color+';color:'+lv.tc+';font-size:14px;font-weight:700;padding:6px 18px;border-radius:10px">'+lv.label+'</span>'
      +'</div>'
      +'<div style="background:#fff;border:1px solid #ddeef8;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<span style="font-size:12px;color:#5DCAA5;font-weight:600">きみまろ</span>'
      +'<span style="font-size:12px;color:#d4537e;font-weight:600">んぽちゃむ</span>'
      +'</div>'
      +'<div style="height:12px;background:#eef5f0;border-radius:6px;overflow:hidden;margin-bottom:12px">'
      +'<div style="height:100%;width:'+barW+'%;background:linear-gradient(90deg,#9FE1CB,#d4537e);border-radius:6px;transition:width 0.8s ease"></div>'
      +'</div>'
      +'<p style="font-size:14px;color:#555;line-height:1.8;margin:0">'+lv.comment+'</p>'
      +'</div>'
      +'<button class="retry-btn" onclick="intro()">もう一度測定するちゃむ</button>';
    document.getElementById("scr").innerHTML=html;
  });
}

intro();
</script>
